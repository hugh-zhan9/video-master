openapi: 3.1.0
info:
  title: CineInsight Native Private API
  version: 0.1.0
  description: Private loopback API between the SwiftUI app and bundled Rust daemon.
servers:
  - url: http://127.0.0.1:{port}
    variables:
      port:
        default: "0"
security:
  - bearerAuth: []
paths:
  /health:
    get:
      summary: Daemon health, version, schema, and database status.
      responses:
        "200":
          description: Health payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "401":
          description: Missing or invalid bearer token.
  /api/videos:
    get:
      summary: List active videos using legacy score cursor order.
      responses:
        "200":
          description: Video page.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoListResponse"
        "401":
          description: Missing or invalid bearer token.
  /api/videos/search:
    post:
      summary: Search videos by keyword, tags, size, height, and cursor.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VideoFilterRequest"
      responses:
        "200":
          description: Video page.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoListResponse"
        "401":
          description: Missing or invalid bearer token.
  /api/videos/random-candidate:
    post:
      summary: Return a smart-random video candidate without mutating playback statistics.
      responses:
        "200":
          description: Random candidate payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RandomCandidateResponse"
        "401":
          description: Missing or invalid bearer token.
  /api/videos/scan:
    post:
      summary: Scan a local directory using legacy video extension and skip rules.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScanDirectoryRequest"
      responses:
        "200":
          description: Scanned video files.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanDirectoryResponse"
        "401":
          description: Missing or invalid bearer token.
  /api/videos/add:
    post:
      summary: Add an existing local video file to PostgreSQL.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddVideoRequest"
      responses:
        "200":
          description: Added video.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoMutationResponse"
        "401":
          description: Missing or invalid bearer token.
        "409":
          description: Active video path already exists.
  /api/videos/{id}/rename:
    post:
      summary: Rename a video file and update its PostgreSQL record.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenameVideoRequest"
      responses:
        "200":
          description: Renamed video.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoMutationResponse"
        "401":
          description: Missing or invalid bearer token.
        "409":
          description: Target file exists.
  /api/videos/{id}/delete:
    post:
      summary: Soft-delete a video record and optionally move the file to trash.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteVideoRequest"
      responses:
        "200":
          description: Deletion result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoMutationResponse"
        "401":
          description: Missing or invalid bearer token.
  /api/videos/{id}/preview-session:
    get:
      summary: Return preview mode and source/action metadata for one video.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Preview session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreviewSessionResponse"
        "401":
          description: Missing or invalid bearer token.
  /api/videos/{id}/preview-externally:
    post:
      summary: Dispatch system preview without mutating formal playback statistics.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: External preview dispatched.
        "401":
          description: Missing or invalid bearer token.
  /api/videos/{id}/play:
    post:
      summary: Dispatch formal playback and update statistics only after dispatch succeeds.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Playback attempt result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaybackAttemptResponse"
        "401":
          description: Missing or invalid bearer token.
  /api/videos/random-play:
    post:
      summary: Select a smart-random candidate, dispatch formal playback, and update random stats only after dispatch succeeds.
      responses:
        "200":
          description: Playback attempt result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaybackAttemptResponse"
        "401":
          description: Missing or invalid bearer token.
  /api/tags:
    get:
      summary: List active tags ordered for library management.
      responses:
        "200":
          description: Active tags.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagListResponse"
        "401":
          description: Missing or invalid bearer token.
    post:
      summary: Create a tag, restoring a soft-deleted same-name tag when present.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TagMutationRequest"
      responses:
        "200":
          description: Created or restored tag.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagRecord"
        "401":
          description: Missing or invalid bearer token.
        "409":
          description: Active tag already exists.
  /api/tags/{id}:
    post:
      summary: Rename or recolor an active tag.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TagMutationRequest"
      responses:
        "200":
          description: Updated tag.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagRecord"
        "401":
          description: Missing or invalid bearer token.
        "404":
          description: Tag not found.
        "409":
          description: Active tag name already exists.
  /api/tags/{id}/delete:
    post:
      summary: Soft-delete a tag and remove video-tag links.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Tag deleted.
        "401":
          description: Missing or invalid bearer token.
        "404":
          description: Tag not found.
  /api/settings:
    get:
      summary: Return public settings with secrets redacted to configured flags.
      responses:
        "200":
          description: Public settings.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicSettings"
        "401":
          description: Missing or invalid bearer token.
    post:
      summary: Update singleton settings and return redacted public settings.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsUpdateRequest"
      responses:
        "200":
          description: Updated public settings.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicSettings"
        "401":
          description: Missing or invalid bearer token.
  /api/scan-directories:
    get:
      summary: List active scan directories.
      responses:
        "200":
          description: Active scan directories.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanDirectoryListResponse"
        "401":
          description: Missing or invalid bearer token.
    post:
      summary: Add a scan directory.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScanDirectoryMutationRequest"
      responses:
        "200":
          description: Added scan directory.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanDirectoryRecord"
        "401":
          description: Missing or invalid bearer token.
  /api/scan-directories/{id}:
    post:
      summary: Update a scan directory path or alias.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScanDirectoryMutationRequest"
      responses:
        "200":
          description: Updated scan directory.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanDirectoryRecord"
        "401":
          description: Missing or invalid bearer token.
        "404":
          description: Scan directory not found.
  /api/scan-directories/{id}/delete:
    post:
      summary: Soft-delete a scan directory.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Scan directory deleted.
        "401":
          description: Missing or invalid bearer token.
        "404":
          description: Scan directory not found.
  /api/subtitles/search:
    get:
      summary: Search indexed subtitles and return the first hit per video.
      parameters:
        - name: keyword
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Subtitle search matches.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubtitleSearchResponse"
        "401":
          description: Missing or invalid bearer token.
  /api/videos/{id}/subtitles:
    get:
      summary: List indexed subtitle segments for a video.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Subtitle segments.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SubtitleSegmentRecord"
        "401":
          description: Missing or invalid bearer token.
  /api/videos/{id}/subtitles/index:
    post:
      summary: Parse and index an SRT file for a video.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IndexSubtitleRequest"
      responses:
        "200":
          description: Updated subtitle index state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubtitleIndexStateRecord"
        "401":
          description: Missing or invalid bearer token.
  /api/ai-tags/candidates:
    get:
      summary: List AI tag candidates.
      responses:
        "200":
          description: AI tag candidates.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AITagCandidateListResponse"
        "401":
          description: Missing or invalid bearer token.
    post:
      summary: Create an AI tag candidate from extracted evidence.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AITagCandidateInput"
      responses:
        "200":
          description: Created AI tag candidate.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AITagCandidateRecord"
        "401":
          description: Missing or invalid bearer token.
  /api/ai-tags/candidates/{id}/approve:
    post:
      summary: Approve an AI tag candidate and create the canonical video-tag link.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Approved candidate.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AITagCandidateRecord"
        "401":
          description: Missing or invalid bearer token.
  /api/ai-tags/candidates/{id}/reject:
    post:
      summary: Reject an AI tag candidate.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Rejected candidate.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AITagCandidateRecord"
        "401":
          description: Missing or invalid bearer token.
  /api/short-feed/next:
    get:
      summary: Return the next PostgreSQL-backed short-feed video.
      responses:
        "200":
          description: Short-feed video.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShortFeedVideoRecord"
        "401":
          description: Missing or invalid bearer token.
  /api/short-feed/videos/{id}/feedback:
    post:
      summary: Record short-feed liked, favorited, and viewed state.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShortFeedFeedbackRequest"
      responses:
        "200":
          description: Updated short-feed interaction.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShortFeedInteractionRecord"
        "401":
          description: Missing or invalid bearer token.
  /api/cleanup/analyze:
    post:
      summary: Run cleanup candidate analysis.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CleanupAnalyzeRequest"
      responses:
        "200":
          description: Cleanup analysis.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CleanupAnalysisRecord"
        "401":
          description: Missing or invalid bearer token.
  /api/diagnostics:
    get:
      summary: Return redacted diagnostic counters and public settings.
      responses:
        "200":
          description: Diagnostics snapshot.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiagnosticsSnapshot"
        "401":
          description: Missing or invalid bearer token.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    HealthResponse:
      type: object
      required:
        - service
        - status
        - version
        - app_compat_version
        - schema
        - database
      properties:
        service:
          type: string
          const: cine-daemon
        status:
          type: string
          enum: [ok, degraded]
        version:
          type: string
        app_compat_version:
          type: string
        schema:
          type: object
          required: [status, required_tables, missing_tables]
          properties:
            status:
              type: string
              enum: [unchecked, compatible, incompatible]
            required_tables:
              type: array
              items:
                type: string
            missing_tables:
              type: array
              items:
                type: string
        database:
          type: object
          required: [configured, connected]
          properties:
            configured:
              type: boolean
            connected:
              type: boolean
            host:
              type: string
            database:
              type: string
            error:
              type: string
    VideoTagSummary:
      type: object
      required: [id, name, color]
      properties:
        id:
          type: integer
        name:
          type: string
        color:
          type: string
    VideoSummary:
      type: object
      required:
        - id
        - name
        - path
        - directory
        - size
        - duration
        - resolution
        - width
        - height
        - is_stale
        - play_count
        - random_play_count
        - tags
        - score
      properties:
        id:
          type: integer
        name:
          type: string
        path:
          type: string
        directory:
          type: string
        size:
          type: integer
        duration:
          type: number
        resolution:
          type: string
        width:
          type: integer
        height:
          type: integer
        is_stale:
          type: boolean
        play_count:
          type: integer
        random_play_count:
          type: integer
        last_played_at:
          type: [string, "null"]
        tags:
          type: array
          items:
            $ref: "#/components/schemas/VideoTagSummary"
        created_at:
          type: [string, "null"]
        updated_at:
          type: [string, "null"]
        score:
          type: number
    VideoCursor:
      type: object
      required: [score, size, id]
      properties:
        score:
          type: number
        size:
          type: integer
        id:
          type: integer
    VideoFilterRequest:
      type: object
      properties:
        keyword:
          type: [string, "null"]
        tag_ids:
          type: array
          items:
            type: integer
        min_size:
          type: [integer, "null"]
        max_size:
          type: [integer, "null"]
        min_height:
          type: [integer, "null"]
        max_height:
          type: [integer, "null"]
        cursor:
          anyOf:
            - $ref: "#/components/schemas/VideoCursor"
            - type: "null"
        limit:
          type: [integer, "null"]
    VideoListResponse:
      type: object
      required: [videos, next_cursor]
      properties:
        videos:
          type: array
          items:
            $ref: "#/components/schemas/VideoSummary"
        next_cursor:
          anyOf:
            - $ref: "#/components/schemas/VideoCursor"
            - type: "null"
    RandomCandidateResponse:
      type: object
      required: [video]
      properties:
        video:
          anyOf:
            - $ref: "#/components/schemas/VideoSummary"
            - type: "null"
        reason_code:
          type: [string, "null"]
        user_message:
          type: [string, "null"]
    AddVideoRequest:
      type: object
      required: [path]
      properties:
        path:
          type: string
    RenameVideoRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
    DeleteVideoRequest:
      type: object
      properties:
        delete_file:
          type: boolean
          default: false
    ScanDirectoryRequest:
      type: object
      required: [path]
      properties:
        path:
          type: string
        extensions:
          type: [string, "null"]
    ScannedFile:
      type: object
      required: [path, size]
      properties:
        path:
          type: string
        size:
          type: integer
    ScanDirectoryResponse:
      type: object
      required: [files]
      properties:
        files:
          type: array
          items:
            $ref: "#/components/schemas/ScannedFile"
    VideoMutationResponse:
      type: object
      required: [video, ok]
      properties:
        video:
          anyOf:
            - $ref: "#/components/schemas/VideoSummary"
            - type: "null"
        ok:
          type: boolean
        reason_code:
          type: [string, "null"]
        user_message:
          type: [string, "null"]
    PreviewSourceDescriptor:
      type: object
      required: [locator_strategy, locator_value, mime]
      properties:
        locator_strategy:
          type: string
        locator_value:
          type: string
        mime:
          type: string
    PreviewExternalAction:
      type: object
      required: [action_id, button_label, hint]
      properties:
        action_id:
          type: string
        button_label:
          type: string
        hint:
          type: string
    PreviewSessionResponse:
      type: object
      required: [video_id, mode, display_name]
      properties:
        video_id:
          type: integer
        mode:
          type: string
          enum: [inline, external-preview, unsupported]
        display_name:
          type: string
        inline_source:
          anyOf:
            - $ref: "#/components/schemas/PreviewSourceDescriptor"
            - type: "null"
        external_action:
          anyOf:
            - $ref: "#/components/schemas/PreviewExternalAction"
            - type: "null"
        reason_code:
          type: [string, "null"]
        reason_message:
          type: [string, "null"]
    PlaybackReconcileResult:
      type: object
      required:
        - video_id
        - did_mark_stale
        - did_relocate
        - did_refresh_metadata
        - needs_reload
      properties:
        video_id:
          type: integer
        did_mark_stale:
          type: boolean
        did_relocate:
          type: boolean
        did_refresh_metadata:
          type: boolean
        needs_reload:
          type: boolean
        updated_video:
          anyOf:
            - $ref: "#/components/schemas/VideoSummary"
            - type: "null"
        reason_code:
          type: [string, "null"]
    PlaybackAttemptResponse:
      type: object
      required: [video, dispatch_succeeded]
      properties:
        video:
          anyOf:
            - $ref: "#/components/schemas/VideoSummary"
            - type: "null"
        dispatch_succeeded:
          type: boolean
        user_message:
          type: [string, "null"]
        reason_code:
          type: [string, "null"]
        reconcile_result:
          anyOf:
            - $ref: "#/components/schemas/PlaybackReconcileResult"
            - type: "null"
    TagRecord:
      type: object
      required: [id, name, color]
      properties:
        id:
          type: integer
        name:
          type: string
        color:
          type: string
    TagMutationRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        color:
          type: string
          default: ""
    TagListResponse:
      type: object
      required: [tags]
      properties:
        tags:
          type: array
          items:
            $ref: "#/components/schemas/TagRecord"
    ScanDirectoryRecord:
      type: object
      required: [id, path, alias]
      properties:
        id:
          type: integer
        path:
          type: string
        alias:
          type: string
    ScanDirectoryMutationRequest:
      type: object
      required: [path]
      properties:
        path:
          type: string
        alias:
          type: string
          default: ""
    ScanDirectoryListResponse:
      type: object
      required: [directories]
      properties:
        directories:
          type: array
          items:
            $ref: "#/components/schemas/ScanDirectoryRecord"
    PublicSettings:
      type: object
      required:
        - video_extensions
        - play_weight
        - short_feed_max_duration_minutes
        - theme
        - deepl_api_key_configured
        - ai_tagging_api_key_configured
        - ai_tagging_frame_count
        - ai_tagging_subtitle_char_limit
        - ai_tagging_startup_batch_size
      properties:
        video_extensions:
          type: string
        play_weight:
          type: number
        short_feed_max_duration_minutes:
          type: integer
        theme:
          type: string
        deepl_api_key_configured:
          type: boolean
        ai_tagging_api_key_configured:
          type: boolean
        ai_tagging_frame_count:
          type: integer
        ai_tagging_subtitle_char_limit:
          type: integer
        ai_tagging_startup_batch_size:
          type: integer
    SettingsUpdateRequest:
      type: object
      required:
        - confirm_before_delete
        - delete_original_file
        - video_extensions
        - play_weight
        - auto_scan_on_startup
        - short_feed_max_duration_minutes
        - theme
        - log_enabled
        - bilingual_enabled
        - bilingual_lang
        - deepl_api_key
        - ai_tagging_base_url
        - ai_tagging_api_key
        - ai_tagging_model
        - ai_tagging_frame_count
        - ai_tagging_subtitle_char_limit
        - ai_tagging_startup_batch_size
      properties:
        confirm_before_delete:
          type: boolean
        delete_original_file:
          type: boolean
        video_extensions:
          type: string
        play_weight:
          type: number
        auto_scan_on_startup:
          type: boolean
        short_feed_max_duration_minutes:
          type: integer
        theme:
          type: string
        log_enabled:
          type: boolean
        bilingual_enabled:
          type: boolean
        bilingual_lang:
          type: string
        deepl_api_key:
          type: string
        ai_tagging_base_url:
          type: string
        ai_tagging_api_key:
          type: string
        ai_tagging_model:
          type: string
        ai_tagging_frame_count:
          type: integer
        ai_tagging_subtitle_char_limit:
          type: integer
        ai_tagging_startup_batch_size:
          type: integer
